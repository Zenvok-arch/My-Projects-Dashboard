<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>
    <div class="container">
        <img class="wallpaper" src="/windows/assets/wp4910735-deadpool-4k-wallpapers.jpg" alt="wallpaper">
        <div class="taskbar">
            <div class="left">
                <img width="48" height="48" src="https://img.icons8.com/fluency/48/partly-cloudy-day.png"
                    alt="partly-cloudy-day" />
            </div>
            <div class="center">
                <div class="taskbar-icon">
                    <img id="windows-11" width="48" height="48" src="https://img.icons8.com/fluency/48/windows-11.png"
                        alt="windows-11" />
                    <img width="48" height="48" src="https://img.icons8.com/fluency/48/windows-explorer.png"
                        alt="windows-explorer" />
                    <img width="48" height="48" src="https://img.icons8.com/color/48/chrome--v1.png" alt="chrome--v1" />
                    <img width="48" height="48" src="https://img.icons8.com/color/48/brave-web-browser.png"
                        alt="brave-web-browser" />
                    <img width="48" height="48" src="https://img.icons8.com/color/48/visual-studio-code-2019.png"
                        alt="visual-studio-code-2019" />
                    <img width="48" height="48" src="https://img.icons8.com/fluency/48/notepad.png" alt="notepad" />
                </div>
            </div>
            <div class="right">
                <img width="24" height="24" src="https://img.icons8.com/fluency/48/microsoft-onedrive-2019.png"
                    alt="microsoft-onedrive-2019" />
                <div class="engus">
                    <span>ENG</span>
                    <span>US</span>
                </div>
                <div class="quick-access-panel">
                    <img width="24" height="24" src="assets/wifi.png" alt="wifi--v1" />
                    <img width="20" height="20" src="assets/sound.png" alt="sound" />
                </div>
                <div class="time-date">
                    <span>5:46 pm</span>
                    <span>7/15/2025</span>
                </div>

            </div>
        </div>
        <div class="start-page">
            <div class="start-page-main">
                <div class="search">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Search for apps, settings, and document">
                </div>
                <div class="app-header">
                    <h3>Pinned</h3>
                    <div class="left-side">
                        <span>All</span>
                        <i class="fa-solid fa-angle-up"></i>
                    </div>
                </div>
                <div class="app-icons">
                    <div class="app-icon">
                        <img src="https://img.icons8.com/fluency/48/microsoft-office-2019.png"
                            alt="microsoft-office-2019" />
                        <span>Microsoft Office</span>
                    </div>


                    <div class="app-icon">
                        <img src="https://img.icons8.com/color/48/chrome--v1.png" alt="chrome--v1" />
                        <span>Chrome</span>
                    </div>
                    <div class="app-icon">
                        <img src="https://img.icons8.com/color/48/brave-web-browser.png" alt="brave-web-browser" />
                        <span>Brave</span>
                    </div>
                    <div class="app-icon">
                        <img src="https://img.icons8.com/fluency/48/notepad.png" alt="notepad" />
                        <span>Notepad</span>
                    </div>

                    <div class="app-icon">
                        <img src="assets/Windows_Settings_icon.svg.png" alt="settings" />
                        <span>Settings</span>
                    </div>

                    <div class="app-icon">
                        <img src="https://img.icons8.com/fluency/48/telegram-app.png" alt="telegram-app" />
                        <span>Telegram</span>
                    </div>
                    <div class="app-icon">
                        <img src="https://img.icons8.com/fluency/48/instagram-new.png" alt="instagram-new" />
                        <span>Instagram</span>
                    </div>
                    <div class="app-icon">
                        <img src="https://img.icons8.com/fluency/48/microsoft-store.png" alt="microsoft-store" />
                        <span>Microsoft Store</span>
                    </div>
                    <div class="app-icon">
                        <img src="https://img.icons8.com/fluency/48/facebook-new.png" alt="facebook-new" />
                        <span>Facebook</span>
                    </div>
                    <div class="app-icon">
                        <img src="https://img.icons8.com/fluency/48/linkedin.png" alt="linkedin" />
                        <span>Linkedin</span>
                    </div>
                    <div class="app-icon">
                        <img src="https://img.icons8.com/fluency/48/microsoft-copilot.png" alt="microsoft-copilot" />
                        <span>Copilot</span>
                    </div>
                </div>
                <div class="app-recco">
                    <div class="app-recco-header">
                        <h3>Recommended</h3>
                        <div class="left-side">
                            <span>All</span>
                            <i class="fa-solid fa-angle-up"></i>
                        </div>
                    </div>
                    <div class="app-recco-icons">
                        <div class="icon">
                            <img src="https://img.icons8.com/fluency/48/telegram-app.png" alt="telegram-app" />
                        <div class="app-recco-details">
                            <span class="title">Telegram</span>
                            <span class="sinfo">Used Recently</span>
                        </div>
                        
                        </div>
                    </div>
                </div>
            </div>

            <div class="user-side">
                <div class="user-sinfo">
                    <img src="assets/user.jpg" alt="deku">
                    <span>Izuku Midoriya</span>
                </div>
                <img width="24" height="24" src="assets/power.png" alt="shutdown--v1"/>
            </div>


            

        </div>

        <div class="notice">
                <span>This isn't the final version 🚧 — new features and cool updates coming soon! ✨</span>
            </div>
        <script src="script.js"></script>
</body>

</html>
